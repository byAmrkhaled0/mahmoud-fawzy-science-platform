<!DOCTYPE html>

<html data-theme="light" dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
<meta content="#155eef" name="theme-color"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="لوحة المدرس"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin/>
<meta name="robots" content="noindex, nofollow"/>
<link href="assets/logo-icon.svg" rel="icon" type="image/svg+xml"/>
<link href="assets/icon-192.png" rel="apple-touch-icon"/>
<title>صفحة المدرس الخاصة | مستر محمود إبراهيم فوزي</title>
<link href="teacher.webmanifest" rel="manifest"/>
<link href="assets/site.css" rel="stylesheet"/>
</head>
<body id="top">
<div class="login-page" id="adminRoot">
<div class="card login-card">
<div class="logo"><span class="logo-mark" data-icon="atom"></span><span>مستر محمود إبراهيم فوزي <small>صفحة المدرس الخاصة</small></span></div>
<h1 class="section-title" style="font-size:2.3rem;margin:22px 0 8px">تسجيل دخول المدرس</h1>
<p style="color:var(--muted);font-weight:800;margin-top:0">هذه صفحة خاصة للمدرس فقط وغير ظاهرة في الموقع العام.</p>
<form class="grid" id="loginForm">
<div class="field"><label for="adminEmail">البريد الإلكتروني</label><input id="adminEmail" autocomplete="username" inputmode="email" name="email" placeholder="اكتب بريد المدرس" required="" type="email" dir="ltr"/></div>
<div class="field"><label for="adminPassword">كلمة المرور</label><input id="adminPassword" autocomplete="current-password" name="password" placeholder="اكتب كلمة المرور" required="" type="password" dir="ltr"/></div>
<button class="btn primary" type="submit"><span data-icon="user-check"></span> دخول لوحة التحكم</button>
</form>
</div>
</div>
<div class="toast" id="toast"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-functions-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="assets/firebase-config.js"></script>
<script src="assets/firebase-sync.js"></script>
<script src="assets/app.js"></script>
<script src="assets/admin.js"></script>
<script src="assets/v53-upgrades.js"></script>
</body>
</html>
